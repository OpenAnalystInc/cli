services:
  api:
    build: .
    ports:
      - "8420:8420"
    env_file:
      - .env
    volumes:
      - ./:/app
      # Mount your transcript data (adjust paths)
      # - /path/to/catalog:/data/catalog
      # - /path/to/transcriptions:/data/transcriptions
    depends_on:
      - neo4j
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"  # Browser UI
      - "7687:7687"  # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/openanalyst-kb-2026
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=1g
      - NEO4J_server_memory_heap_max__size=2g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
