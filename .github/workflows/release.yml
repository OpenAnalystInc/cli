name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: openanalyst
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: openanalyst
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: openanalyst
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: openanalyst
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: openanalyst.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross

      - name: Build (native)
        if: "!matrix.cross"
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }} -p openanalyst-cli

      - name: Build (cross)
        if: matrix.cross
        working-directory: rust
        run: cross build --release --target ${{ matrix.target }} -p openanalyst-cli

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp "rust/target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/openanalyst-${{ matrix.target }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openanalyst-${{ matrix.target }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
