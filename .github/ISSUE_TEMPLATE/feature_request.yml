name: Feature Request
description: Suggest a new feature for OpenAnalyst CLI
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe what you'd like.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like?
      placeholder: "I'd like to be able to..."
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: How would you use this feature?
      placeholder: "When working on X, I often need to..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds?
      placeholder: "I currently use /scrape but it doesn't..."

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Slash Commands
        - TUI / Interface
        - Provider Support
        - Tool System
        - Plugin System
        - Performance
        - Documentation
        - Other
