name: Bug Report
description: Report a bug in OpenAnalyst CLI
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: "When I run /model, it shows..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `openanalyst`
        2. Type `/model gpt-4o`
        3. See error...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: OpenAnalyst CLI Version
      description: "Run `openanalyst --version` to get this"
      placeholder: "v1.0.89"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Linux (x64)
        - Linux (ARM)
        - Other
    validations:
      required: true

  - type: input
    id: provider
    attributes:
      label: LLM Provider
      description: "Which provider were you using?"
      placeholder: "OpenAI / Anthropic / Gemini / etc."

  - type: textarea
    id: logs
    attributes:
      label: Error Output
      description: Paste any error messages or logs
      render: shell
